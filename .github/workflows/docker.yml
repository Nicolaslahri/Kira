# Build + push a multi-arch image to GHCR on every push to main, so the NAS
# can PULL a prebuilt image instead of compiling Vite + Rust wheels on 1 GB of
# RAM (audit §17: build-on-NAS OOM/stall risk; armv7 has no pydantic-core
# wheels at all). In Portainer, switch the stack to:
#   image: ghcr.io/nicolaslahri/kira:latest
name: docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Boot the image we just pushed and prove the container actually serves —
  # /health green + auth/status shaped right. Catches "builds but won't start"
  # (bad entrypoint, missing migrations, import errors) before Portainer does.
  smoke:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Boot + probe
        run: |
          # Docker refuses mixed-case refs; ${{ github.repository }} keeps the
          # repo's original casing (Nicolaslahri/Kira). metadata-action
          # lowercases automatically on the build side — mirror it here.
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}:latest"
          docker run -d --name kira -p 8000:8000 "$IMAGE"
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/v1/health > /dev/null; then break; fi
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/api/v1/health | tee health.json
          python3 -c "import json; d = json.load(open('health.json')); assert d['status'] == 'ok' and d['db'] == 'ok', d"
          curl -sf http://127.0.0.1:8000/api/v1/auth/status | python3 -c "import json,sys; d = json.load(sys.stdin); assert 'required' in d and 'onboarded' in d, d"
          echo "smoke OK"
      - name: Container logs on failure
        if: failure()
        run: docker logs kira
