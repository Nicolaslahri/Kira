# Kira — self-hosted, Docker-native media renamer.
#   docker compose up -d   →   http://localhost:8000
services:
  kira:
    build: .
    # Once a published image exists, swap `build: .` for:
    #   image: ghcr.io/nicolaslahri/kira:latest
    container_name: kira
    ports:
      - "8445:8000"
    volumes:
      # SQLite DB + persisted state. Keep this to survive container recreation.
      # NOTE (Portainer git stacks): a RELATIVE ./config resolves inside
      # Portainer's own project directory and is easily lost on stack
      # delete/recreate. Prefer an ABSOLUTE host path you control, e.g.:
      #   - /mnt/dietpi_userdata/kira-config:/config
      - ${KIRA_CONFIG_HOST:-./config}:/config
      # YOUR media library — mounted read-write so Kira can rename/move in place.
      # This is the NAS-local path behind the SMB share \\192.168.0.63\Data —
      # confirmed from `path =` under [Data] in DietPi's /etc/samba/smb.conf.
      # Override KIRA_MEDIA_HOST in Portainer's env to point elsewhere.
      - ${KIRA_MEDIA_HOST:-/mnt/dietpi_userdata/data}:/media
    environment:
      # Run as your host user so files Kira creates on the share keep YOUR
      # ownership (matches the Samba user on the NAS). Comment out to run as
      # root (old behaviour).
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - KIRA_DATABASE_URL=sqlite+aiosqlite:////config/kira.db
      - KIRA_MEDIA_ROOT=/media
      - KIRA_BROWSE_ROOT=/media          # the folder-picker can browse here
      # Provider API keys are also settable in the UI (Settings → Connections);
      # set them here to bootstrap a fresh container:
      # - KIRA_TMDB_API_KEY=
      # - KIRA_TVDB_API_KEY=
      # Optional HTTP Basic auth — set BOTH to require login on every request
      # (recommended if Kira is reachable beyond localhost):
      # - KIRA_AUTH_USER=admin
      # - KIRA_AUTH_PASS=change-me
    restart: unless-stopped
    # Bound the Docker json-file log so a chatty INFO-level app can't fill the
    # DietPi system disk (default driver rotates nothing).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Give the cooperative-cancel shutdown drain (up to ~10s) room to finish
    # before Docker SIGKILLs mid-drain (default stop grace is 10s).
    stop_grace_period: 20s
    # Optional memory cap. Uncomment + tune for your box — set too low and a
    # large scan (mediainfo enrich + WAL) gets OOM-killed mid-run, so leave it
    # off unless the host needs protecting from Kira. On a 1 GB DietPi, ~768m
    # protects sshd/Samba while giving scans headroom:
    #   mem_limit: 768m
    healthcheck:
      # No curl in python:slim — use the interpreter that's already here.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 20s
